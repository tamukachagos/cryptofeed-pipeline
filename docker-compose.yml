version: "3.9"

# ============================================================
# Zero-Trust Network Architecture
#
# Networks:
#   internal  — Redis, collector, processor, api, monitoring (no external access)
#   public    — nginx only (internet-facing)
#
# All services run as non-root (uid 1000).
# /internal/* and /metrics are blocked at nginx before reaching the API.
# Redis uses noeviction — security keys are NEVER silently evicted.
# ============================================================

networks:
  internal:
    driver: bridge
    internal: true          # No direct internet access from internal services
  public:
    driver: bridge

volumes:
  redis_data:
  certbot_certs:
  prometheus_data:
  alertmanager_data:

services:

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - internal
    # Do NOT expose port 6379 externally — internal only
    volumes:
      - redis_data:/data
      - ./deploy/redis.conf:/etc/redis/redis.conf:ro
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass "${REDIS_PASSWORD:-changeme_in_production}"
      --maxmemory 1gb
      --maxmemory-policy noeviction
      --appendonly yes
    restart: unless-stopped
    user: "999:999"          # redis user in alpine image
    read_only: false          # needs to write AOF
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Data collector ────────────────────────────────────────
  collector:
    build: .
    command: python collector/main.py
    env_file: .env
    environment:
      - ENVIRONMENT=production
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./logs:/app/logs
    restart: unless-stopped
    user: "1000:1000"
    read_only: false
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Processor ─────────────────────────────────────────────
  processor:
    build: .
    command: python processor/main.py
    env_file: .env
    environment:
      - ENVIRONMENT=production
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./logs:/app/logs
    restart: unless-stopped
    user: "1000:1000"
    read_only: false
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── API server ────────────────────────────────────────────
  api:
    build: .
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --no-access-log
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - BYPASS_AUTH=false        # Explicit — overrides any .env value
      - ENABLE_DOCS=false        # No Swagger in production
    networks:
      - internal
    # Do NOT expose 8000 externally — nginx terminates TLS and proxies
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}:/data:ro    # Read-only — API never writes data
    restart: unless-stopped
    user: "1000:1000"
    read_only: false
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Agents (AI orchestrator) ──────────────────────────────
  agents:
    build: .
    command: python agents/orchestrator.py
    env_file: .env
    environment:
      - ENVIRONMENT=production
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}:/data:ro
      - ./reports:/app/reports
    restart: unless-stopped
    user: "1000:1000"
    read_only: false
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis Exporter (Prometheus metrics for Redis) ─────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_in_production}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    user: "65534:65534"    # nobody
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus_alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    depends_on:
      - api
      - redis-exporter
    restart: unless-stopped
    user: "65534:65534"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Alertmanager (PagerDuty + email) ──────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./deploy/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY}
      - PAGERDUTY_CRITICAL_KEY=${PAGERDUTY_CRITICAL_KEY:-}
      - OPS_EMAIL=${OPS_EMAIL:-ops@cryptodataapi.dev}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-alerts@cryptodataapi.dev}
    networks:
      - internal
    depends_on:
      - prometheus
    restart: unless-stopped
    user: "65534:65534"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Nginx TLS termination (internet-facing) ───────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal     # can reach API backend
      - public       # internet-facing
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/ssl/certs:ro
      - /etc/ssl/private:/etc/ssl/private:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
