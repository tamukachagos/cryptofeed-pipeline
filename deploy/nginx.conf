# ============================================================
# CryptoFeed API — Nginx TLS Termination + Zero-Trust Transport
# ============================================================
#
# Responsibilities:
#   - Force HTTPS (redirect all HTTP → HTTPS)
#   - HSTS with preload (strict 2-year policy)
#   - Modern TLS only (TLSv1.2 + TLSv1.3, no legacy ciphers)
#   - Security headers on every response
#   - Block /internal/* from public internet
#   - Rate limiting at the proxy layer (first line of defence)
#   - Connection limits to prevent slowloris / L7 floods
#
# ============================================================

# ── Connection rate limiting (before auth) ─────────────────
# 10 new connections per second per IP — burst of 30 allowed
limit_conn_zone $binary_remote_addr zone=addr:10m;
limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=60r/m;

# ── Upstream API ───────────────────────────────────────────
upstream api_backend {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cryptodataapi.dev www.cryptodataapi.dev;

    # ── TLS configuration ──────────────────────────────────
    ssl_certificate     /etc/ssl/certs/cryptodataapi.crt;
    ssl_certificate_key /etc/ssl/private/cryptodataapi.key;

    # Modern profile: TLSv1.2 + TLSv1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite — prefer ECDHE, no RSA key exchange, no CBC in TLS 1.2
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;   # Let TLS 1.3 clients choose freely

    # Session tickets — disable for perfect forward secrecy
    ssl_session_tickets off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP stapling — serve certificate status without client round-trip
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;
    resolver 1.1.1.1 8.8.8.8 valid=60s;
    resolver_timeout 5s;

    # DH parameters — prevent Logjam
    ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # ── Security headers ───────────────────────────────────
    # HSTS: 2 years, include subdomains, submit for browser preload list
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # CSP: API only — no browser content to protect, but prevents MIME sniffing exploits
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Remove server fingerprinting
    server_tokens off;
    more_clear_headers "Server";

    # ── Connection and request limits ──────────────────────
    limit_conn addr 20;                    # max 20 concurrent connections per IP
    limit_req zone=req_per_ip burst=30 nodelay;

    client_max_body_size 2m;               # backup to app-level 1MB limit
    client_body_timeout  10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    send_timeout 30s;

    # ── Block /internal/* at proxy level ──────────────────
    # Internal endpoints must NEVER be reachable from the public internet.
    # They are only callable from within the Docker network.
    location /internal/ {
        deny all;
        return 403;
    }

    # ── Block /metrics — Prometheus scrape target is internal-only ─
    location = /metrics {
        deny all;
        return 403;
    }

    # ── Block Swagger UI in production ────────────────────
    location ~ ^/(docs|redoc|openapi.json)$ {
        deny all;
        return 403;
    }

    # ── Health check (low-cost, no rate limit) ─────────────
    location = /health {
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── API endpoints ──────────────────────────────────────
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffering — disable for streaming responses (parquet/csv downloads)
        proxy_buffering off;
    }
}
