# ============================================================
# CryptoFeed Redis Production Configuration
# ============================================================
#
# SECURITY: maxmemory-policy MUST be noeviction.
# allkeys-lru silently evicts rate-limit and nonce keys under
# memory pressure, defeating both controls.  With noeviction,
# Redis returns OOM errors instead — the application catches
# these, logs them, and falls back gracefully without silently
# resetting security state.
#
# ============================================================

# Network — bind to internal interface only, never 0.0.0.0 in production
bind 127.0.0.1
# In Docker: the container's internal IP; override in docker-compose command args

# Authentication — always set a strong password in production
# requirepass <set_via_environment>

# Memory limit — set to leave headroom for OS (typically 75% of available RAM)
maxmemory 1gb

# CRITICAL: noeviction — return OOM error instead of silently deleting keys
# This ensures rate-limit keys and nonce keys are NEVER silently removed
maxmemory-policy noeviction

# Persistence — AOF for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Latency monitoring — detect when Redis is slow (>10ms considered slow)
latency-monitor-threshold 10
latency-tracking yes

# Slow log — log commands taking >10ms
slowlog-log-slower-than 10000
slowlog-max-len 256

# Memory usage reporting — enables MEMORY USAGE command
activerehashing yes

# Key expiry — active expiration of TTL keys
hz 20
dynamic-hz yes

# Connection limits — prevent connection exhaustion
maxclients 1000

# TCP keepalive — detect dead connections
tcp-keepalive 60

# Logging
loglevel notice

# ============================================================
# Memory alert thresholds (for external monitoring)
# These are comments — wire up to Prometheus/Alertmanager:
#
#   Alert when:  redis_memory_used_bytes / redis_memory_max_bytes > 0.80
#   Critical:    > 0.90  (imminent OOM — scale Redis or reduce data)
#   Page:        > 0.95
#
# ============================================================
